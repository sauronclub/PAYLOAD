name: PAYLOAD

on:
  schedule:
    - cron: '0 16 * * *'  # 东京时间 01:00 运行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Capture PAYLOAD
        env:
          TYPE_ID_URL: ${{ secrets.TYPE_ID_URL }}
          TYPE_ACTRESS_URL: ${{ secrets.TYPE_ACTRESS_URL }}
          TYPE_REALTIME_URL: ${{ secrets.TYPE_REALTIME_URL }}
          TYPE_REALTIME_VR_URL: ${{ secrets.TYPE_REALTIME_VR_URL }}
          TYPE_DAILY_URL: ${{ secrets.TYPE_DAILY_URL }}
          TYPE_WEEKLY_URL: ${{ secrets.TYPE_WEEKLY_URL }}
          TYPE_MONTHLY_URL: ${{ secrets.TYPE_MONTHLY_URL }}
          TYPE_MONTHLY_ACTRESS_URL: ${{ secrets.TYPE_MONTHLY_ACTRESS_URL }}
          TYPE_MONTHLY_SERIES_URL: ${{ secrets.TYPE_MONTHLY_SERIES_URL }}
          GRAPHQL_API_URL: ${{ secrets.GRAPHQL_API_URL }}
          HEADER_KEY: ${{ secrets.HEADER_KEY }}
          HEADER_VALUE: ${{ secrets.HEADER_VALUE }}
          actress_id: ${{ secrets.ACTRESS_ID }}
          cid: ${{ secrets.CID }}
        run: |
          python main.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update PAYLOAD files
        run: |
          # 确保目录存在
          mkdir -p PAYLOAD
          
          timestamp=$(date +%Y-%m-%d_%H-%M-%S)

          # 调试：确认文件存在
          ls -la PAYLOAD/
          
          # 基于远端最新提交，避免冲突
          tmp_dir=$(mktemp -d)
          cp -a PAYLOAD "$tmp_dir"/PAYLOAD 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          rm -rf PAYLOAD
          cp -a "$tmp_dir"/PAYLOAD PAYLOAD 2>/dev/null || true
          
          git add PAYLOAD/
          git status -sb
          git commit -m "Update PAYLOAD: $timestamp" --allow-empty
          git push origin main

